<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>StratScan AI</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="container">

    <h1 class="app-title">
      StratScan AI
    </h1>

    <div class="card">

      <div class="form-grid">

        <div>

          <label>Mode</label>

          <select
            id="mode"
            onchange="toggleModeFields()"
          >

            <option value="new">
              New Scan
            </option>

            <option value="watchlist">
              Watchlist Follow-Up
            </option>

            <option value="active">
              Active Trade Follow-Up
            </option>

          </select>

        </div>

        <div>

          <label>Stock Name</label>

          <input
            type="text"
            id="stockName"
            placeholder="Enter stock name"
          >

        </div>

        <div>

          <label>Timeframe</label>

          <select id="timeframe">

            <option>
              Daily
            </option>

            <option>
              15 Min
            </option>

          </select>

        </div>

        <div>

          <label>LTP</label>

          <input
            type="number"
            id="ltp"
          >

        </div>

        <div>

          <label>EMA 20</label>

          <input
            type="number"
            id="ema20"
          >

        </div>

        <div>

          <label>EMA 50</label>

          <input
            type="number"
            id="ema50"
          >

        </div>

        <div>

          <label>RSI</label>

          <input
            type="number"
            id="rsi"
          >

        </div>

      </div>

      <!-- WATCHLIST -->

      <div
        id="watchlistFields"
        class="hidden"
      >

        <h2 class="sub-title">
          Watchlist Follow-Up
        </h2>

        <div class="form-grid">

          <div>

            <label>
              Previous Entry High
            </label>

            <input
              type="number"
              id="previousEntryHigh"
            >

          </div>

          <div>

            <label>
              Previous Stop Loss
            </label>

            <input
              type="number"
              id="previousStopLoss"
            >

          </div>

        </div>

      </div>

      <!-- ACTIVE TRADE -->

      <div
        id="activeFields"
        class="hidden"
      >

        <h2 class="sub-title">
          Active Trade Follow-Up
        </h2>

        <div class="form-grid">

          <div>

            <label>
              Executed Entry
            </label>

            <input
              type="number"
              id="executedEntry"
            >

          </div>

          <div>

            <label>
              Current Stop Loss
            </label>

            <input
              type="number"
              id="currentSL"
            >

          </div>

          <div>

            <label>
              Current Target
            </label>

            <input
              type="number"
              id="currentTarget"
            >

          </div>

          <div>

            <label>
              Quantity Traded
            </label>

            <input
              type="number"
              id="quantityTraded"
            >

          </div>

        </div>

      </div>

      <button
        class="analyze-btn"
        onclick="analyzeStock()"
      >
        Analyze
      </button>

    </div>

    <!-- RESULT -->

    <div
      id="resultCard"
      class="card hidden"
    >

      <h2>
        Analysis Result
      </h2>

      <div id="resultContent"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
